<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nizolar — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    .dispute-card{background:white;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);margin-bottom:18px;border-left:4px solid var(--secondary);}
    .dispute-card.resolved{border-left-color:var(--green);opacity:0.7;}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;}
    .side-box{border-radius:10px;padding:14px;}
    .side-buyer{background:#fff0f3;border:1px solid #fecdd3;}
    .side-seller{background:var(--green-light);border:1px solid #bbf7d0;}
    .chat-log{background:var(--bg);border-radius:10px;padding:14px;max-height:200px;overflow-y:auto;border:1px solid var(--border);font-size:13px;}
    .chat-log-msg{padding:6px 0;border-bottom:1px solid var(--border-light);}
    .chat-log-msg:last-child{border:none;}
    .resolve-btns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <a href="../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
        <img src="../images/logo.svg" width="28" height="28" style="border-radius:7px;" alt="logo"/>
        <span class="brand">InstaMarket</span>
      </a><small>Admin Panel</small>
    </div>
    <nav class="admin-nav">
      <div class="nav-section">Asosiy</div>
      <a href="index.html"><span class="icon">📊</span>Dashboard</a>
      <a href="listings.html"><span class="icon">📱</span>E'lonlar</a>
      <a href="users.html"><span class="icon">👥</span>Foydalanuvchilar</a>
      <div class="nav-section">Savdo</div>
      <a href="orders.html"><span class="icon">💰</span>Savdolar</a>
      <a href="disputes.html" class="active"><span class="icon">⚠️</span>Nizolar</a>
      <a href="finance.html"><span class="icon">📈</span>Moliya</a>
      <div class="nav-section">Tizim</div>
      <a href="settings.html"><span class="icon">⚙️</span>Sozlamalar</a>
      <a href="../index.html"><span class="icon">🌐</span>Saytga qaytish</a>
      <a href="../pages/login.html" onclick="logoutUser()"><span class="icon">🚪</span>Chiqish</a>
    </nav>
  </aside>

  <div class="admin-content">
    <div class="admin-topbar">
      <h1>⚠️ Nizolar boshqaruvi</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="filterSel" onchange="filterDisputes(this.value)"
          style="border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;outline:none;">
          <option value="all">Barchasi</option>
          <option value="open">Ochiq</option>
          <option value="resolved">Hal qilingan</option>
        </select>
      </div>
    </div>

    <div class="admin-body">
      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;">
        <div class="dash-card" style="border-color:var(--secondary);">
          <div class="dc-label">⚠️ Ochiq nizolar</div>
          <div class="dc-val" id="openCount" style="color:var(--secondary);">—</div>
        </div>
        <div class="dash-card" style="border-color:var(--green);">
          <div class="dc-label">✅ Hal qilingan</div>
          <div class="dc-val" id="resolvedCount" style="color:var(--green-dark);">—</div>
        </div>
        <div class="dash-card">
          <div class="dc-label">💰 Qaytarilgan pul</div>
          <div class="dc-val" id="refundedAmt">$0</div>
        </div>
      </div>

      <div id="disputeList">
        <div style="text-align:center;padding:48px;color:var(--text-muted);">⏳ Yuklanmoqda...</div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:580px;position:relative;">
    <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    <div class="modal-title" id="modalTitle">Nizo tafsiloti</div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
var firebaseOk = initFirebase();
var allDisputes = [];

// Demo nizolar
var demoDisputes = [
  {
    id:'d1', status:'open',
    orderId:'order_001', amount:65,
    listingTitle:'food_toshkent', emoji:'🍔',
    buyerName:'Sherzod M.', sellerName:'Nilufar R.',
    buyerComplaint:'Account parolini o\'zgartirib bo\'lmayapti. Sotuvchi aloqa qilmayapti.',
    sellerResponse:'Parol to\'g\'ri berildi. Xaridor xato kiritayapti.',
    createdAt:'31.05.2024',
    chat:[
      {name:'Sherzod M.', text:'Parol ishlamayapti!', time:'14:22'},
      {name:'Nilufar R.', text:'Men to\'g\'ri yubordim.', time:'15:10'},
      {name:'Sherzod M.', text:'Hali ham ishlamayapti, admin yordam bersin.', time:'16:05'},
    ]
  },
  {
    id:'d2', status:'open',
    orderId:'order_002', amount:45,
    listingTitle:'travel_uzbekistan', emoji:'✈️',
    buyerName:'Dilnoza K.', sellerName:'Jasur T.',
    buyerComplaint:'Accountni sotib olganimda 1,500 follower deyilgan, hozir 900 ta. Kamayib ketdi!',
    sellerResponse:'Men sotishdan oldin 1,500 edi. Xaridor sotib olgandan keyin nima qilganini bilmayman.',
    createdAt:'29.05.2024',
    chat:[
      {name:'Dilnoza K.', text:'Followers kamaydi!', time:'3 kun oldin'},
      {name:'Jasur T.', text:'Savdo paytida to\'g\'ri edi.', time:'3 kun oldin'},
    ]
  },
  {
    id:'d3', status:'resolved',
    orderId:'order_003', amount:40,
    listingTitle:'beauty_uz_girl', emoji:'💄',
    buyerName:'Malika S.', sellerName:'Kamola S.',
    buyerComplaint:'Account eski parol bilan ochmayapti.',
    sellerResponse:'Yangi parolni yuklab yubordim.',
    resolvedAs:'buyer',
    createdAt:'25.05.2024',
    chat:[
      {name:'Malika S.', text:'Parol ishlamayapti', time:'25.05'},
    ]
  }
];

function renderDisputes(list) {
  var open     = list.filter(function(d){return d.status==='open';});
  var resolved = list.filter(function(d){return d.status==='resolved';});
  var refunded = list.filter(function(d){return d.resolvedAs==='buyer';})
    .reduce(function(s,d){return s+(d.amount||0);}, 0);

  document.getElementById('openCount').textContent     = open.length;
  document.getElementById('resolvedCount').textContent = resolved.length;
  document.getElementById('refundedAmt').textContent   = '$' + refunded;

  var container = document.getElementById('disputeList');
  if (!list.length) {
    container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted);">✅ Nizo yo\'q</div>';
    return;
  }

  container.innerHTML = list.map(function(d) {
    var isOpen = d.status === 'open';
    return `
    <div class="dispute-card ${isOpen?'':'resolved'}" id="dc_${d.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
            <span style="font-size:22px;">${d.emoji||'📱'}</span>
            <span style="font-size:17px;font-weight:800;">Nizo #${d.id}</span>
            ${isOpen
              ? '<span class="status-badge s-rejected">🔴 Ochiq</span>'
              : '<span class="status-badge s-active">✅ Hal qilingan</span>'}
          </div>
          <div style="font-size:13px;color:var(--text-muted);">@${d.listingTitle} · $${d.amount} · ${d.createdAt||''}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openDetail('${d.id}')">📋 Batafsil</button>
      </div>

      <div class="two-col">
        <div class="side-box side-buyer">
          <div style="font-size:11px;font-weight:700;color:#be123c;margin-bottom:6px;">👤 XARIDOR — ${d.buyerName}</div>
          <p style="font-size:13px;line-height:1.6;">${d.buyerComplaint}</p>
        </div>
        <div class="side-box side-seller">
          <div style="font-size:11px;font-weight:700;color:var(--green-dark);margin-bottom:6px;">💰 SOTUVCHI — ${d.sellerName}</div>
          <p style="font-size:13px;line-height:1.6;">${d.sellerResponse}</p>
        </div>
      </div>

      ${isOpen ? `
      <div class="resolve-btns">
        <button class="btn btn-sm btn-green" onclick="resolve('${d.id}','buyer')">
          💸 Pul xaridorga qaytsin — $${d.amount}
        </button>
        <button class="btn btn-sm btn-primary" onclick="resolve('${d.id}','seller')">
          ✅ Pul sotuvchiga o'tsin
        </button>
        <button class="btn btn-sm btn-ghost" onclick="openDetail('${d.id}')">
          💬 Suhbatni ko'rish
        </button>
      </div>` : `
      <div style="font-size:13px;color:var(--text-muted);margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;">
        ✅ Hal qilindi: Pul <strong>${d.resolvedAs==='buyer'?'xaridorga qaytarildi':'sotuvchiga o\'tkazildi'}</strong>
      </div>`}
    </div>`;
  }).join('');
}

function openDetail(id) {
  var d = allDisputes.find(function(x){return x.id===id;});
  if (!d) return;
  document.getElementById('modalTitle').textContent = '⚠️ Nizo #' + d.id + ' — @' + d.listingTitle;
  var chatHtml = d.chat && d.chat.length
    ? d.chat.map(function(m){
        return '<div class="chat-log-msg"><span style="font-weight:600;">'+m.name+':</span> '+m.text+' <span style="float:right;color:var(--text-muted);font-size:11px;">'+m.time+'</span><div style="clear:both;"></div></div>';
      }).join('')
    : '<p style="color:var(--text-muted);">Chat yozishmalar yo\'q</p>';

  document.getElementById('modalBody').innerHTML = `
    <div class="two-col" style="margin-top:16px;">
      <div class="side-box side-buyer">
        <div style="font-size:11px;font-weight:700;color:#be123c;margin-bottom:6px;">👤 ${d.buyerName}</div>
        <p style="font-size:13px;">${d.buyerComplaint}</p>
      </div>
      <div class="side-box side-seller">
        <div style="font-size:11px;font-weight:700;color:var(--green-dark);margin-bottom:6px;">💰 ${d.sellerName}</div>
        <p style="font-size:13px;">${d.sellerResponse}</p>
      </div>
    </div>
    <div style="margin:16px 0;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">💬 Suhbat tarixi</div>
      <div class="chat-log">${chatHtml}</div>
    </div>
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px;font-size:13px;color:#92400e;margin-bottom:16px;">
      💰 Escrow da ushlanib turgan pul: <strong>$${d.amount}</strong>
    </div>
    ${d.status==='open' ? `
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-light);">QAROR QILING:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="btn btn-green" style="justify-content:center;" onclick="resolve('${d.id}','buyer');closeModal('detailModal')">
        💸 Pul xaridorga qaytsin
      </button>
      <button class="btn btn-primary" style="justify-content:center;" onclick="resolve('${d.id}','seller');closeModal('detailModal')">
        ✅ Pul sotuvchiga o'tsin
      </button>
    </div>` : `<p style="color:var(--green-dark);font-weight:600;text-align:center;">✅ Bu nizo hal qilingan</p>`}
  `;
  openModal('detailModal');
}

async function resolve(id, winner) {
  var d = allDisputes.find(function(x){return x.id===id;});
  if (!d) return;

  if (firebaseOk && !id.startsWith('d')) {
    var res = await resolveDisputeDB(d.orderId || id, winner);
    if (!res.success) { showToast('Xato: ' + res.error, 'error'); return; }
  }

  d.status = 'resolved';
  d.resolvedAs = winner;
  renderDisputes(allDisputes);

  var msg = winner === 'buyer'
    ? '💸 Pul xaridorga qaytarildi: $' + d.amount
    : '✅ Pul sotuvchiga o\'tkazildi: $' + d.amount;
  showToast(msg);
}

function filterDisputes(val) {
  var filtered = val === 'all' ? allDisputes
    : allDisputes.filter(function(d){return d.status===(val==='open'?'open':'resolved');});
  renderDisputes(filtered);
}

async function loadDisputes() {
  var disputes = [];
  if (firebaseOk) {
    try {
      var snap = await db.collection('orders').where('status', '==', 'dispute').get();
      snap.docs.forEach(function(doc) {
        var d = doc.data();
        disputes.push({
          id: doc.id, status: 'open',
          orderId: doc.id, amount: d.amount || 0,
          listingTitle: d.listingTitle || '—', emoji: d.listingEmoji || '📱',
          buyerName: d.buyerName || '—', sellerName: d.sellerName || '—',
          buyerComplaint: d.disputeReason || 'Muammo xabar qilingan.',
          sellerResponse: 'Javob kutilmoqda...',
          createdAt: d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleDateString('uz-UZ') : '—',
          chat: []
        });
      });
    } catch(e) { console.warn(e); }
  }
  if (!disputes.length) disputes = demoDisputes;
  allDisputes = disputes;
  renderDisputes(disputes);
}

document.addEventListener('DOMContentLoaded', function() {
  if (!requireAdmin()) return;
  loadDisputes();
  document.querySelectorAll('.modal-overlay').forEach(function(m) {
    m.addEventListener('click', function(e){ if(e.target===m) m.classList.remove('open'); });
  });
});
</script>
</body>
</html>
