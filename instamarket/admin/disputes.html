<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nizolar — Admin Panel</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <a href="../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
        <img src="../images/logo.svg" width="30" height="30" alt="InstaMarket" style="border-radius:8px;display:block;"/><span>InstaMarket</span>
      </a><small>Admin Panel</small>
    </div>
    <nav class="admin-nav">
      <div class="nav-label">Asosiy</div>
      <a href="index.html"><span class="icon">📊</span> Dashboard</a>
      <a href="listings.html"><span class="icon">📱</span> E'lonlar</a>
      <a href="users.html"><span class="icon">👥</span> Foydalanuvchilar</a>
      <div class="nav-label">Savdo</div>
      <a href="orders.html"><span class="icon">💰</span> Savdolar</a>
      <a href="disputes.html" class="active"><span class="icon">⚠️</span> Nizolar</a>
      <a href="finance.html"><span class="icon">📈</span> Moliya</a>
      <div class="nav-label">Tizim</div>
      <a href="settings.html"><span class="icon">⚙️</span> Sozlamalar</a>
      <a href="../index.html"><span class="icon">🌐</span> Saytga qaytish</a>
    </nav>
  </aside>

  <div class="admin-content">
    <div class="admin-header">
      <h1>⚠️ Nizolar boshqaruvi</h1>
      <span style="background:rgba(225,48,108,0.1);color:var(--primary);padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700;">2 ta aktiv nizo</span>
    </div>

    <div class="admin-body">
      <!-- Aktiv nizolar -->
      <div style="display:flex;flex-direction:column;gap:20px;" id="disputeList"></div>
    </div>
  </div>
</div>

<!-- Nizo detail modal -->
<div class="modal-overlay" id="disputeModal">
  <div class="modal" style="max-width:600px;position:relative;">
    <button class="modal-close" onclick="closeModal('disputeModal')">✕</button>
    <div class="modal-title" id="disputeModalTitle"></div>
    <div id="disputeModalBody"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script>
const _AP="instamarket2024admin";
if(sessionStorage.getItem("admin_auth")!==_AP){document.body.innerHTML='<div style="min-height:100vh;background:linear-gradient(135deg,#1A1A2E,#16213E);display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;"><div style="background:white;border-radius:24px;padding:40px;width:100%;max-width:400px;"><div style="text-align:center;margin-bottom:24px;"><div style="font-size:48px;">🔐</div><h2 style="font-weight:800;margin:12px 0 8px;">Admin Panel</h2></div><input type="password" id="ap" placeholder="Parol..." style="width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-size:15px;outline:none;box-sizing:border-box;margin-bottom:12px;" onkeypress="if(event.key===Enter)cp()"/><button onclick="cp()" style="width:100%;background:linear-gradient(135deg,#E1306C,#F58529);color:white;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;">Kirish</button></div></div>';window.cp=function(){if(document.getElementById("ap").value===_AP){sessionStorage.setItem("admin_auth",_AP);location.reload();}else{alert("Parol noto`g`ri!");}};}  
</script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
const disputes = [
  {
    id: 23, status: 'active',
    account: { emoji:'🍔', username:'food_toshkent', price: 165 },
    buyer: { name:'Sherzod M.', complaint:'Account parolini o\'zgartirib bo\'lmayapti. Sotuvchi aloqa qilmayapti.' },
    seller: { name:'Nilufar R.', response:'Parol to\'g\'ri berildi. Xaridor o\'zi xato kiritayapti.' },
    time: '2 kun oldin', escrow: 165,
    chat: [
      { from:'Sherzod M.', msg:'Parol ishlamayapti!', time:'Kecha 14:22' },
      { from:'Nilufar R.', msg:'Men to\'g\'ri yubordim, qayta urinib ko\'ring.', time:'Kecha 15:10' },
      { from:'Sherzod M.', msg:'Hali ham ishlamayapti, admin yordam bersin.', time:'Kecha 16:05' },
    ]
  },
  {
    id: 24, status: 'active',
    account: { emoji:'📱', username:'tech_review_old', price: 95 },
    buyer: { name:'Dilnoza K.', complaint:'Accountni sotib olganimda 12K follower deyilgan edi, lekin hozir 8K. Followers kamayib ketibdi.' },
    seller: { name:'Akbar N.', response:'Men sotishdan oldin 12K edi, xaridor sotib olgandan keyin nimalar qilganini bilmayman.' },
    time: '3 kun oldin', escrow: 95,
    chat: [
      { from:'Dilnoza K.', msg:'Followers soni 4000 taga kamaydi!', time:'3 kun oldin' },
      { from:'Akbar N.', msg:'Savdo paytida to\'g\'ri edi.', time:'3 kun oldin' },
    ]
  }
];

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openDispute(id) {
  const d = disputes.find(x => x.id === id);
  document.getElementById('disputeModalTitle').textContent = `⚠️ Nizo #${d.id} — @${d.account.username}`;
  document.getElementById('disputeModalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div style="background:#fde8e8;border-radius:10px;padding:14px;">
        <div style="font-size:12px;color:var(--primary);font-weight:700;margin-bottom:6px;">👤 XARIDOR — ${d.buyer.name}</div>
        <p style="font-size:14px;color:var(--text);">${d.buyer.complaint}</p>
      </div>
      <div style="background:var(--green-light);border-radius:10px;padding:14px;">
        <div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:6px;">💰 SOTUVCHI — ${d.seller.name}</div>
        <p style="font-size:14px;color:var(--text);">${d.seller.response}</p>
      </div>
    </div>
    <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">💬 Suhbat tarixi</div>
      ${d.chat.map(m=>`<div style="margin-bottom:8px;"><span style="font-weight:600;font-size:13px;">${m.from}:</span> <span style="font-size:13px;color:var(--text-light);">${m.msg}</span> <span style="font-size:11px;color:var(--text-light);float:right;">${m.time}</span><div style="clear:both;"></div></div>`).join('')}
    </div>
    <div style="background:#fff3cd;border-radius:10px;padding:12px 16px;font-size:14px;color:#856404;margin-bottom:16px;">
      <strong>Escrow da ushlanib turgan pul: $${d.escrow}</strong>
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-light);">ADMIN QARORI:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="btn btn-green" style="justify-content:center;" onclick="resolveDispute(${d.id},'buyer'); closeModal('disputeModal');">💸 Pul xaridorga qaytsin</button>
      <button class="btn btn-primary" style="justify-content:center;" onclick="resolveDispute(${d.id},'seller'); closeModal('disputeModal');">✅ Pul sotuvchiga o'tsin</button>
    </div>`;
  openModal('disputeModal');
}

function resolveDispute(id, winner) {
  const card = document.getElementById(`dispute-${id}`);
  if (card) card.style.opacity = '0.5';
  const msg = winner === 'buyer' ? `✅ Nizo #${id} — pul xaridorga qaytarildi` : `✅ Nizo #${id} — pul sotuvchiga o'tkazildi`;
  showToast(msg, 'success');
}

document.addEventListener('DOMContentLoaded', () => {
  const list = document.getElementById('disputeList');
  list.innerHTML = disputes.map(d => `
    <div id="dispute-${d.id}" style="background:white;border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border-left:4px solid var(--primary);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            <span style="font-size:24px;">${d.account.emoji}</span>
            <span style="font-size:18px;font-weight:800;">Nizo #${d.id}</span>
            <span class="status-badge status-rejected">🔴 Aktiv</span>
          </div>
          <div style="font-size:14px;color:var(--text-light);">@${d.account.username} · $${d.account.price} · ${d.time}</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openDispute(${d.id})">📋 Batafsil ko'rish</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div style="background:#fde8e8;border-radius:10px;padding:14px;">
          <div style="font-size:12px;color:var(--primary);font-weight:700;margin-bottom:6px;">👤 XARIDOR — ${d.buyer.name}</div>
          <p style="font-size:14px;line-height:1.6;">${d.buyer.complaint}</p>
        </div>
        <div style="background:var(--green-light);border-radius:10px;padding:14px;">
          <div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:6px;">💰 SOTUVCHI — ${d.seller.name}</div>
          <p style="font-size:14px;line-height:1.6;">${d.seller.response}</p>
        </div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-green btn-sm" onclick="resolveDispute(${d.id},'buyer')">💸 Pul xaridorga qaytsin ($${d.account.price})</button>
        <button class="btn btn-primary btn-sm" onclick="resolveDispute(${d.id},'seller')">✅ Pul sotuvchiga o'tsin</button>
        <button class="btn btn-secondary btn-sm" onclick="openDispute(${d.id})">💬 Suhbatni ko'rish</button>
      </div>
    </div>`).join('');

  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));
});
</script>
</body>
</html>
