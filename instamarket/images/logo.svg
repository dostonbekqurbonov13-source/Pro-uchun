<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <defs>
    <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F58529"/>
      <stop offset="50%" stop-color="#E1306C"/>
      <stop offset="100%" stop-color="#833AB4"/>
    </linearGradient>
    <linearGradient id="cart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00B248"/>
    </linearGradient>
  </defs>

  <!-- Instagram belgisi (to'liq, original shakl) -->
  <rect x="2" y="2" width="52" height="52" rx="14" fill="url(#ig)"/>
  <!-- Ichki border -->
  <rect x="6" y="6" width="44" height="44" rx="11" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Aravacha tanasi (yashil, Instagram ichida) -->
  <rect x="10" y="18" width="28" height="18" rx="4" fill="url(#cart)"/>
  <!-- Aravacha ichki ajratgich -->
  <line x1="10" y1="25" x2="38" y2="25" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Dollar belgisi -->
  <text x="24" y="34" font-size="9" fill="white" font-weight="900" text-anchor="middle" font-family="Arial, sans-serif">$</text>

  <!-- Aravacha dastasi (chap yuqori) -->
  <path d="M10 22 L8 18 L5 18" stroke="url(#cart)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- G'ildiraklar -->
  <circle cx="16" cy="42" r="4" fill="url(#cart)"/>
  <circle cx="16" cy="42" r="2" fill="white" opacity="0.9"/>
  <circle cx="30" cy="42" r="4" fill="url(#cart)"/>
  <circle cx="30" cy="42" r="2" fill="white" opacity="0.9"/>

  <!-- Yuqori o'ng nuqta (Instagram flash) -->
  <circle cx="43" cy="13" r="3" fill="white" opacity="0.9"/>
</svg>
