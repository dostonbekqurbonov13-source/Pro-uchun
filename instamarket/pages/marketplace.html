<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bozor — InstaMarket.uz</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    .gate-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(10,10,10,0.6);backdrop-filter:blur(3px);}
    .gate-box{background:white;border-radius:24px;padding:36px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.25);animation:popIn 0.3s ease;}
    @keyframes popIn{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
    .gate-benefit{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-light);padding:5px 0;text-align:left;}
    .preview-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:20px;}
    .preview-card{background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);}
    .preview-card-top{padding:18px 18px 0;display:flex;align-items:center;gap:12px;}
    .preview-avatar{width:52px;height:52px;border-radius:50%;background:var(--gradient);flex-shrink:0;}
    .preview-lines{flex:1;}
    .preview-line{height:12px;background:var(--border);border-radius:6px;margin-bottom:8px;}
    .preview-line.short{width:60%;}
    .preview-stats{display:grid;grid-template-columns:1fr 1fr 1fr;margin:14px 0 0;border-top:1px solid var(--border-light);}
    .preview-stat{padding:12px 8px;text-align:center;border-right:1px solid var(--border-light);}
    .preview-stat:last-child{border-right:none;}
    .preview-stat-val{height:14px;background:var(--border);border-radius:4px;margin-bottom:6px;}
    .preview-stat-key{height:8px;background:var(--border-light);border-radius:4px;width:60%;margin:0 auto;}
    .preview-foot{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border-light);}
    .preview-price{height:20px;width:100px;background:var(--border);border-radius:6px;}
    .preview-btn{height:32px;width:80px;background:var(--border);border-radius:8px;}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="navbar-brand">
    <img src="../images/logo.svg" width="32" height="32" style="border-radius:8px;" alt="logo"/>
    <span>InstaMarket</span>
  </a>
  <div class="nav-links">
    <a href="../index.html">Bosh sahifa</a>
    <a href="marketplace.html" style="color:var(--primary);font-weight:700;">Bozor</a>
    <a href="sell.html" style="color:var(--primary);font-weight:600;">💰 Sotish</a>
    <a href="login.html" class="btn-nav-login">Kirish</a>
    <a href="register.html" class="btn-nav-register">Ro'yxatdan o'tish</a>
  </div>
  <button class="nav-mobile-btn" onclick="toggleMenu()">☰</button>
</nav>

<!-- HEADER -->
<div style="background:var(--dark);padding:72px 32px 36px;margin-top:64px;">
  <div style="max-width:1200px;margin:0 auto;">
    <h1 style="color:white;font-size:34px;font-weight:900;margin-bottom:10px;">Instagram Account <span class="gradient-text">Bozori</span></h1>
    <p style="color:rgba(255,255,255,0.5);font-size:15px;margin-bottom:26px;">Tekshirilgan va kafolatlangan accountlar</p>
    <div class="search-wrap" style="max-width:540px;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12);">
      <input type="text" id="searchInp" placeholder="Username, niche yoki kategoriya..." style="color:white;background:transparent;" oninput="filterAccounts()"/>
      <button onclick="filterAccounts()" style="background:var(--gradient);">🔍 Qidirish</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;">
      <button class="cat-chip active" onclick="setCat('all',this)"><span>🏪</span>Barchasi</button>
      <button class="cat-chip" onclick="setCat('food',this)"><span>🍔</span>Ovqat</button>
      <button class="cat-chip" onclick="setCat('travel',this)"><span>✈️</span>Sayohat</button>
      <button class="cat-chip" onclick="setCat('fitness',this)"><span>💪</span>Fitness</button>
      <button class="cat-chip" onclick="setCat('beauty',this)"><span>💄</span>Go'zallik</button>
      <button class="cat-chip" onclick="setCat('business',this)"><span>💼</span>Biznes</button>
      <button class="cat-chip" onclick="setCat('tech',this)"><span>📱</span>Tech</button>
      <button class="cat-chip" onclick="setCat('art',this)"><span>🎨</span>San'at</button>
      <button class="cat-chip" onclick="setCat('home',this)"><span>🏠</span>Uy</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="marketplace-layout">
  <aside class="filter-sidebar">
    <div class="filter-title">Filterlar <span class="filter-clear" onclick="clearFilters()">Tozalash</span></div>

    <div class="filter-group">
      <label>Narx (so'm)</label>
      <input type="range" class="range-slider" id="priceRng" min="0" max="5000000" step="50000" value="5000000" oninput="updRange('price',this.value)"/>
      <div class="range-vals"><span>0</span><span id="priceVal">5 mln+</span></div>
    </div>

    <div class="filter-group">
      <label>Followers soni</label>
      <input type="range" class="range-slider" id="flwRng" min="1000" max="50000" step="500" value="50000" oninput="updRange('flw',this.value)"/>
      <div class="range-vals"><span>1K</span><span id="flwVal">50K+</span></div>
    </div>

    <div class="filter-group">
      <label>Min. Engagement Rate</label>
      <input type="range" class="range-slider" id="erRng" min="1" max="15" value="1" step="0.5" oninput="updRange('er',this.value)"/>
      <div class="range-vals"><span>1%</span><span id="erVal">1%+</span></div>
    </div>

    <div class="filter-group">
      <label>Holat</label>
      <div class="check-list">
        <label><input type="checkbox" id="chkVer" onchange="filterAccounts()"/> ✅ Verified</label>
        <label><input type="checkbox" id="chkTop" onchange="filterAccounts()"/> ⭐ TOP</label>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;" onclick="filterAccounts()">Qo'llash</button>
  </aside>

  <main>
    <div class="mkt-header">
      <div class="result-count">Ko'rsatilmoqda: <strong id="resCount">0</strong> ta account</div>
      <select class="sort-sel" id="sortSel" onchange="filterAccounts()">
        <option value="">Saralash: Standart</option>
        <option value="price_asc">Narx: Arzondan</option>
        <option value="price_desc">Narx: Qimmatdan</option>
        <option value="flw_desc">Ko'p followers</option>
        <option value="er_desc">Yuqori ER</option>
      </select>
    </div>
    <div class="cards-grid" id="cardsList"></div>
    <div id="emptyState" style="display:none;text-align:center;padding:72px 24px;">
      <div style="font-size:56px;margin-bottom:14px;">🔍</div>
      <h3 style="font-size:20px;margin-bottom:7px;">Hech narsa topilmadi</h3>
      <p style="color:var(--text-muted);">Filter shartlarini o'zgartiring</p>
      <button class="btn btn-primary" style="margin-top:18px;" onclick="clearFilters()">Tozalash</button>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
var firebaseOk = initFirebase();
var allItems   = [];
var activeCat  = 'all';
var maxPrice   = 5000000, maxFlw = 50000, minER = 1;
var CARDS_VISIBLE = 3;

// ===== GATE =====
function showGate() {
  if (document.getElementById('gateOverlay')) return;
  document.body.style.overflow = 'hidden';
  var o = document.createElement('div');
  o.id = 'gateOverlay';
  o.className = 'gate-overlay';
  o.innerHTML =
    '<div class="gate-box">' +
      '<div style="font-size:52px;margin-bottom:12px;">🔐</div>' +
      '<div style="font-size:21px;font-weight:800;margin-bottom:8px;">Ko\'rish uchun kiring</div>' +
      '<div style="font-size:14px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;">Barcha accountlarni ko\'rish uchun <strong>bepul ro\'yxatdan o\'ting!</strong></div>' +
      '<div style="margin-bottom:20px;">' +
        '<div class="gate-benefit"><span>✅</span> Barcha accountlarni ko\'rish</div>' +
        '<div class="gate-benefit"><span>📊</span> To\'liq statistika va nakrutka tahlili</div>' +
        '<div class="gate-benefit"><span>💬</span> Sotuvchi bilan chat</div>' +
        '<div class="gate-benefit"><span>🛡️</span> Escrow himoyali xarid</div>' +
      '</div>' +
      '<a href="register.html" class="btn btn-primary btn-lg" style="display:block;justify-content:center;margin-bottom:10px;">🚀 Bepul ro\'yxatdan o\'tish</a>' +
      '<a href="login.html" class="btn btn-ghost" style="display:block;justify-content:center;margin-bottom:12px;">Kirish →</a>' +
      '<div style="font-size:12px;color:var(--text-muted);cursor:pointer;" onclick="closeGate()">Yopish (faqat ' + CARDS_VISIBLE + ' ta ko\'rinadi)</div>' +
    '</div>';
  document.body.appendChild(o);
}

function closeGate() {
  var o = document.getElementById('gateOverlay');
  if (!o) return;
  o.style.opacity = '0';
  o.style.transition = 'opacity 0.3s';
  setTimeout(function() { o.remove(); document.body.style.overflow = ''; }, 300);
}

function handleCardClick(id) {
  if (!loadUser()) { showGate(); return; }
  window.location.href = 'account.html?id=' + id;
}

// ===== LOAD =====
async function loadMarket() {
  document.getElementById('cardsList').innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">⏳ Yuklanmoqda...</div>';

  var items = [];
  if (firebaseOk) {
    try {
      // Barcha e'lonlarni olib, JS da filter qilamiz (index kerak emas)
      var snap = await db.collection('listings').limit(100).get();
      var all = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
      items = all.filter(function(a){ return a.status === 'active'; });
    } catch(e) { console.warn('Firebase:', e.message); }
  }

  // Demo accountlar FAQAT Firebase bo'sh bo'lsa ko'rinadi
  if (items.length === 0) {
    var demoItems = accounts.map(function(a){
      return Object.assign({}, a, {id:'demo_'+a.id, status:'active'});
    });
    allItems = demoItems;
  } else {
    allItems = items; // Faqat haqiqiy accountlar
  }
  filterAccounts();
}

// ===== FILTER =====
function setCat(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.cat-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  filterAccounts();
}

function updRange(type, val) {
  if (type === 'price') {
    maxPrice = parseInt(val);
    document.getElementById('priceVal').textContent =
      parseInt(val) >= 5000000 ? '5 mln+' : parseInt(val).toLocaleString('uz-UZ') + ' so\'m';
  }
  if (type === 'flw') {
    maxFlw = parseInt(val);
    document.getElementById('flwVal').textContent = parseInt(val) >= 50000 ? '50K+' : (val/1000).toFixed(0)+'K';
  }
  if (type === 'er') {
    minER = parseFloat(val);
    document.getElementById('erVal').textContent = val+'%+';
  }
  filterAccounts();
}

function filterAccounts() {
  var user   = loadUser();
  var q      = (document.getElementById('searchInp').value||'').toLowerCase();
  var sort   = document.getElementById('sortSel').value;
  var chkVer = document.getElementById('chkVer').checked;
  var chkTop = document.getElementById('chkTop').checked;

  var filtered = allItems.filter(function(a) {
    if (activeCat !== 'all' && (a.category||'') !== activeCat) return false;
    if ((a.price||0) > maxPrice) return false;
    if ((a.followers||0) > maxFlw) return false;
    if ((a.er||0) < minER) return false;
    if (chkVer && a.badge !== 'verified') return false;
    if (chkTop && a.badge !== 'top') return false;
    if (q && !((a.username||'')+(a.niche||'')+(a.category||'')).toLowerCase().includes(q)) return false;
    return true;
  });

  if (sort === 'price_asc')  filtered.sort(function(a,b){ return (a.price||0)-(b.price||0); });
  if (sort === 'price_desc') filtered.sort(function(a,b){ return (b.price||0)-(a.price||0); });
  if (sort === 'flw_desc')   filtered.sort(function(a,b){ return (b.followers||0)-(a.followers||0); });
  if (sort === 'er_desc')    filtered.sort(function(a,b){ return (b.er||0)-(a.er||0); });

  document.getElementById('resCount').textContent = filtered.length;
  var listEl  = document.getElementById('cardsList');
  var emptyEl = document.getElementById('emptyState');

  if (!filtered.length) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';

  if (user) {
    listEl.innerHTML = filtered.map(renderRealCard).join('');
  } else {
    var visible   = filtered.slice(0, CARDS_VISIBLE);
    var remaining = Math.max(0, filtered.length - CARDS_VISIBLE);
    var html = visible.map(renderRealCard).join('');
    if (remaining > 0) {
      html += '<div style="position:relative;grid-column:1/-1;">' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:20px;filter:blur(5px);opacity:0.5;pointer-events:none;">' +
          Array(Math.min(remaining,6)).fill('').map(renderPreviewCard).join('') +
        '</div>' +
        '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;">' +
          '<div style="background:white;border-radius:20px;padding:28px 32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15);max-width:360px;">' +
            '<div style="font-size:36px;margin-bottom:10px;">🔒</div>' +
            '<div style="font-size:18px;font-weight:800;margin-bottom:8px;">'+remaining+' ta account yashirilgan</div>' +
            '<div style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">Ko\'rish uchun bepul ro\'yxatdan o\'ting</div>' +
            '<a href="register.html" class="btn btn-primary" style="display:block;margin-bottom:9px;">🚀 Bepul ro\'yxatdan o\'tish</a>' +
            '<a href="login.html" style="font-size:13px;color:var(--primary);">Hisobim bor →</a>' +
          '</div>' +
        '</div>' +
      '</div>';
    }
    listEl.innerHTML = html;
  }
}

function renderRealCard(a) {
  var badge = a.badge === 'top'
    ? '<span class="badge badge-top">⭐ TOP</span>'
    : '<span class="badge badge-verified">✅ Verified</span>';
  return '<div class="account-card" onclick="handleCardClick(\''+a.id+'\')" style="cursor:pointer;">' +
    '<div class="card-top">' +
      '<div class="card-avatar">'+(a.emoji||'📱')+'</div>' +
      '<div><div class="card-username">@'+(a.username||'')+'</div>' +
      '<div class="card-niche">'+(a.niche||'')+'</div>' +
      '<div class="card-badge-wrap">'+badge+'</div></div>' +
    '</div>' +
    '<div class="card-stats">' +
      '<div class="card-stat"><div class="val">'+formatNum(a.followers||0)+'</div><div class="key">Followers</div></div>' +
      '<div class="card-stat"><div class="val" style="color:var(--green)">'+(a.er||0)+'%</div><div class="key">ER</div></div>' +
      '<div class="card-stat"><div class="val">'+(a.score||0)+'</div><div class="key">Ball</div></div>' +
    '</div>' +
    '<div class="card-foot">' +
      '<div class="card-price">'+(a.price ? formatUZS(a.price) : '—')+'</div>' +
      '<button class="card-btn">Ko\'rish →</button>' +
    '</div></div>';
}

function renderPreviewCard() {
  return '<div class="preview-card">' +
    '<div class="preview-card-top"><div class="preview-avatar"></div>' +
    '<div class="preview-lines"><div class="preview-line"></div><div class="preview-line short"></div></div></div>' +
    '<div class="preview-stats">' +
      '<div class="preview-stat"><div class="preview-stat-val"></div><div class="preview-stat-key"></div></div>' +
      '<div class="preview-stat"><div class="preview-stat-val"></div><div class="preview-stat-key"></div></div>' +
      '<div class="preview-stat"><div class="preview-stat-val"></div><div class="preview-stat-key"></div></div>' +
    '</div>' +
    '<div class="preview-foot"><div class="preview-price"></div><div class="preview-btn"></div></div></div>';
}

function clearFilters() {
  activeCat = 'all';
  document.getElementById('searchInp').value = '';
  document.getElementById('priceRng').value = 5000000; document.getElementById('priceVal').textContent = '5 mln+';
  document.getElementById('flwRng').value = 50000;    document.getElementById('flwVal').textContent = '50K+';
  document.getElementById('erRng').value = 1;          document.getElementById('erVal').textContent = '1%+';
  document.getElementById('chkVer').checked = false;
  document.getElementById('chkTop').checked = false;
  document.getElementById('sortSel').value = '';
  document.querySelectorAll('.cat-chip').forEach(function(c,i){ c.classList.toggle('active', i===0); });
  maxPrice = 5000000; maxFlw = 50000; minER = 1;
  filterAccounts();
}

document.addEventListener('DOMContentLoaded', function() {
  var cat = getParam('cat');
  if (cat && cat !== 'all') {
    activeCat = cat;
    document.querySelectorAll('.cat-chip').forEach(function(el){
      el.classList.toggle('active', el.textContent.toLowerCase().includes(cat));
    });
  }
  var q = getParam('q');
  if (q) document.getElementById('searchInp').value = q;
  loadMarket();
});
</script>
</body>
</html>
