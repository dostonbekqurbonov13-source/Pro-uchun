<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirish — InstaBazar.uz</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <a href="../index.html" style="display:inline-flex;align-items:center;gap:10px;">
        <img src="../images/logo.svg" width="38" height="38" style="border-radius:10px;" alt="logo"/>
        <span style="font-size:22px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">InstaBazar</span>
      </a>
    </div>

    <h1 class="auth-title">Xush kelibsiz 👋</h1>
    <p class="auth-sub">Hisobingizga kiring</p>

    <div id="errBox" style="display:none;background:#fee2e2;color:#b91c1c;border-radius:10px;padding:12px 16px;font-size:14px;margin-bottom:16px;border:1px solid #fecaca;"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" class="form-input" id="email" placeholder="email@gmail.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>🔒 Parol</label>
        <div style="position:relative;">
          <input type="password" class="form-input" id="password" placeholder="Parolingiz" required autocomplete="current-password" style="padding-right:48px;"/>
          <button type="button" onclick="togglePass()" id="eyeBtn"
            style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:20px;">
        <a href="#" onclick="handleReset(event)" style="font-size:13px;color:var(--primary);font-weight:500;">Parolni unutdingizmi?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px;" id="loginBtn">
        Kirish →
      </button>
    </form>

    <div class="auth-divider"><span>yoki</span></div>

    <!-- Google Login -->
    <button onclick="handleGoogleLogin()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:13px;border:1.5px solid var(--border);border-radius:12px;background:white;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:16px;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google bilan kirish
    </button>

    <p style="text-align:center;font-size:14px;color:var(--text-muted);">
      Hisob yo'qmi?
      <a href="register.html" style="color:var(--primary);font-weight:700;"> Ro'yxatdan o'ting</a>
    </p>
    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:10px;">
      Admin?
      <a href="../admin/index.html" style="color:var(--primary);font-weight:600;"> Admin panelga o'tish →</a>
    </p>  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
var firebaseOk = initFirebase();

// Allaqachon kirgan bo'lsa yo'naltirish
document.addEventListener('DOMContentLoaded', function() {
  var user = loadUser();
  if (user) {
    window.location.href = user.role === 'admin' ? '../admin/index.html' : '../index.html';
  }
});

function showErr(msg) {
  var b = document.getElementById('errBox');
  b.textContent = '❌ ' + msg;
  b.style.display = 'block';
  setTimeout(function(){ b.style.display = 'none'; }, 5000);
}

function togglePass() {
  var inp = document.getElementById('password');
  var btn = document.getElementById('eyeBtn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

async function handleLogin(e) {
  e.preventDefault();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn      = document.getElementById('loginBtn');
  btn.textContent = '⏳ Kirish...';
  btn.disabled = true;
  if (firebaseOk) {
    var res = await loginUser(email, password);
    if (res.success) {
      showToast('✅ Muvaffaqiyatli kirdingiz!');
      setTimeout(function() {
        var u = loadUser();
        if (u && u.role === 'admin') window.location.href = '../admin/index.html';
        else window.location.href = '../index.html';
      }, 700);
    } else {
      showErr(res.error);
      btn.textContent = 'Kirish →';
      btn.disabled = false;
    }
  } else {
    var u = { uid:'local-'+Date.now(), name:email.split('@')[0], email, role:'buyer' };
    saveUserLocal(u);
    showToast('✅ Demo rejimda kirdingiz');
    setTimeout(function(){ window.location.href = '../index.html'; }, 700);
  }
}

async function handleGoogleLogin() {
  var btn = event.target.closest('button');
  btn.textContent = '⏳ Yuklanmoqda...';
  btn.disabled = true;

  if (firebaseOk) {
    var res = await loginWithGoogle();
    if (res.success) {
      showToast('✅ Google bilan kirdingiz!');
      setTimeout(function() {
        var u = loadUser();
        if (u && u.role === 'admin') window.location.href = '../admin/index.html';
        else window.location.href = '../index.html';
      }, 700);
    } else if (res.error) {
      showErr(res.error);
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Google bilan kirish';
      btn.disabled = false;
    } else {
      // foydalanuvchi popup yopdi
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Google bilan kirish';
      btn.disabled = false;
    }
  } else {
    showErr('Firebase ulanmagan!');
    btn.disabled = false;
  }
}

async function handleReset(e) {
  e.preventDefault();
  var email = document.getElementById('email').value.trim();
  if (!email) { showErr('Avval emailingizni kiriting!'); return; }
  if (firebaseOk) {
    var res = await resetPassword(email);
    if (res.success) showToast('📧 Parol tiklash xabari emailga yuborildi!');
    else showErr(res.error);
  } else {
    showToast('Firebase ulanmagan', 'error');
  }
}
</script>
</body>
</html>
