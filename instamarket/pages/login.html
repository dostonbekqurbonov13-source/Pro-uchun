<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirish — InstaMarket.uz</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <a href="../index.html" style="display:inline-flex; align-items:center; gap:10px; text-decoration:none;">
        <img src="../images/logo.svg" width="44" height="44" alt="logo"/>
        <span style="font-size:24px; font-weight:900; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">InstaMarket</span>
      </a>
    </div>
    <h1 class="auth-title">Xush kelibsiz! 👋</h1>
    <p class="auth-subtitle">Hisobingizga kiring</p>

    <div id="errorMsg" style="display:none; background:#fde8e8; color:#c53030; border-radius:10px; padding:12px 16px; font-size:14px; margin-bottom:16px; display:none;"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" class="form-input" id="email" placeholder="sizning@email.com" required/>
      </div>
      <div class="form-group">
        <label>🔒 Parol</label>
        <div style="position:relative;">
          <input type="password" class="form-input" id="password" placeholder="Parolingizni kiriting" required style="padding-right:48px;"/>
          <button type="button" onclick="togglePass()" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px;" id="eyeBtn">👁</button>
        </div>
      </div>
      <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
        <a href="#" style="font-size:14px; color:var(--primary); text-decoration:none; font-weight:500;">Parolni unutdingizmi?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; font-size:16px; padding:14px;" id="loginBtn">
        Kirish →
      </button>
    </form>

    <div class="auth-divider"><span>yoki</span></div>

    <div style="text-align:center; font-size:14px; color:var(--text-light);">
      Hisobingiz yo'qmi?
      <a href="register.html" style="color:var(--primary); font-weight:700; text-decoration:none;"> Ro'yxatdan o'ting</a>
    </div>

    <!-- Demo kirish -->
    <div style="margin-top:20px; background:var(--bg); border-radius:12px; padding:16px;">
      <p style="font-size:13px; color:var(--text-light); margin-bottom:10px; font-weight:600;">🧪 Demo kirish:</p>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <button onclick="demoLogin('buyer')" style="background:rgba(225,48,108,0.08); color:var(--primary); border:1px solid rgba(225,48,108,0.2); border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;">👤 Xaridor sifatida kirish</button>
        <button onclick="demoLogin('seller')" style="background:rgba(0,200,81,0.08); color:var(--green); border:1px solid rgba(0,200,81,0.2); border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;">💰 Sotuvchi sifatida kirish</button>
        <button onclick="demoLogin('admin')" style="background:rgba(131,58,180,0.08); color:#833AB4; border:1px solid rgba(131,58,180,0.2); border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;">⚙️ Admin sifatida kirish</button>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Kirish...'; btn.disabled = true;
    setTimeout(() => {
      const email = document.getElementById('email').value;
      const user = { name: email.split('@')[0], email, role: 'buyer' };
      localStorage.setItem('instamarket_user', JSON.stringify(user));
      showToast('✅ Muvaffaqiyatli kirdingiz!');
      setTimeout(() => window.location.href = '../index.html', 1000);
    }, 1200);
  }

  function demoLogin(role) {
    const users = {
      buyer:  { name: 'Jasur Xaridor', email: 'buyer@demo.uz',  role: 'buyer'  },
      seller: { name: 'Nilufar Sotuvchi', email: 'seller@demo.uz', role: 'seller' },
      admin:  { name: 'Admin', email: 'admin@instamarket.uz', role: 'admin'  }
    };
    localStorage.setItem('instamarket_user', JSON.stringify(users[role]));
    showToast('✅ Demo kirish muvaffaqiyatli!');
    setTimeout(() => {
      if (role === 'admin') window.location.href = '../admin/index.html';
      else window.location.href = '../index.html';
    }, 800);
  }
</script>
</body>
</html>
