<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ro'yxatdan o'tish — InstaMarket.uz</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-page" style="padding:20px 16px;">
  <div class="auth-box" style="max-width:480px;">
    <div class="auth-logo">
      <a href="../index.html" style="display:inline-flex;align-items:center;gap:10px;">
        <img src="../images/logo.svg" width="38" height="38" style="border-radius:10px;" alt="logo"/>
        <span style="font-size:22px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">InstaMarket</span>
      </a>
    </div>
    <h1 class="auth-title">Ro'yxatdan o'ting 🚀</h1>
    <p class="auth-sub">Bepul hisob oching</p>

    <!-- Rol tanlash -->
    <div class="role-tabs" id="roleTabs">
      <div class="role-tab active" onclick="selectRole('buyer',this)">
        <div style="font-size:26px;margin-bottom:5px;">🛒</div>
        <div style="font-weight:700;">Xaridor</div>
        <div style="font-size:12px;color:inherit;opacity:0.7;margin-top:3px;">Account sotib olaman</div>
      </div>
      <div class="role-tab" onclick="selectRole('seller',this)">
        <div style="font-size:26px;margin-bottom:5px;">💰</div>
        <div style="font-weight:700;">Sotuvchi</div>
        <div style="font-size:12px;color:inherit;opacity:0.7;margin-top:3px;">Account sotaman</div>
      </div>
    </div>
    <input type="hidden" id="selectedRole" value="buyer"/>

    <div id="errBox" style="display:none;background:#fee2e2;color:#b91c1c;border-radius:10px;padding:12px 16px;font-size:14px;margin-bottom:16px;border:1px solid #fecaca;"></div>

    <form id="regForm" onsubmit="handleRegister(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group" style="margin:0;">
          <label>Ism *</label>
          <input type="text" class="form-input" id="firstName" placeholder="Ismingiz" required/>
        </div>
        <div class="form-group" style="margin:0;">
          <label>Familiya *</label>
          <input type="text" class="form-input" id="lastName" placeholder="Familiyangiz" required/>
        </div>
      </div>
      <div class="form-group" style="margin-top:14px;">
        <label>📧 Email *</label>
        <input type="email" class="form-input" id="email" placeholder="email@gmail.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>📱 Telefon (ixtiyoriy)</label>
        <input type="tel" class="form-input" id="phone" placeholder="+998 90 123 45 67"/>
      </div>
      <div class="form-group">
        <label>🔒 Parol *</label>
        <div style="position:relative;">
          <input type="password" class="form-input" id="password" placeholder="Kamida 6 ta belgi" required minlength="6" oninput="checkPassStrength(this.value)" style="padding-right:46px;"/>
          <button type="button" onclick="togglePass('password','eye1')" id="eye1" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--text-muted);">👁</button>
        </div>
        <div id="strengthBar" style="display:none;margin-top:7px;">
          <div style="height:4px;background:var(--border);border-radius:2px;"><div id="strengthFill" style="height:100%;border-radius:2px;transition:all 0.3s;"></div></div>
          <span id="strengthLabel" style="font-size:11px;margin-top:3px;display:block;"></span>
        </div>
      </div>
      <div class="form-group">
        <label>🔒 Parolni tasdiqlang *</label>
        <div style="position:relative;">
          <input type="password" class="form-input" id="password2" placeholder="Parolni qaytaring" required minlength="6" style="padding-right:46px;"/>
          <button type="button" onclick="togglePass('password2','eye2')" id="eye2" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--text-muted);">👁</button>
        </div>
      </div>

      <!-- Sotuvchi qo'shimcha -->
      <div id="sellerNote" style="display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:16px;">
        <p style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:7px;">💡 Sotuvchi uchun:</p>
        <ul style="font-size:13px;color:#92400e;padding-left:16px;line-height:2;margin:0;">
          <li>Minimal 1,000 follower bo'lishi kerak</li>
          <li>Har savdodan 12% komissiya</li>
          <li>E'lon moderatsiyadan o'tadi (24 soat)</li>
        </ul>
      </div>

      <label style="display:flex;align-items:flex-start;gap:9px;cursor:pointer;font-size:13px;margin-bottom:20px;color:var(--text-light);">
        <input type="checkbox" id="agree" required style="margin-top:2px;accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;"/>
        <span><a href="#" style="color:var(--primary);font-weight:600;">Foydalanish shartlari</a> va <a href="#" style="color:var(--primary);font-weight:600;">Maxfiylik siyosati</a>ga roziman</span>
      </label>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px;" id="regBtn">
        Ro'yxatdan o'tish →
      </button>
    </form>

    <p style="text-align:center;font-size:14px;color:var(--text-muted);margin-top:20px;">
      Allaqachon hisobingiz bormi? <a href="login.html" style="color:var(--primary);font-weight:700;">Kirish</a>
    </p>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
var firebaseOk = initFirebase();

function selectRole(role, el) {
  document.getElementById('selectedRole').value = role;
  document.querySelectorAll('.role-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('sellerNote').style.display = role === 'seller' ? 'block' : 'none';
}

function togglePass(id, btnId) {
  var inp = document.getElementById(id);
  var btn = document.getElementById(btnId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkPassStrength(val) {
  var bar = document.getElementById('strengthBar');
  var fill = document.getElementById('strengthFill');
  var label = document.getElementById('strengthLabel');
  bar.style.display = val.length > 0 ? 'block' : 'none';
  var score = [val.length >= 8, /[A-Z]/.test(val), /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val)].filter(Boolean).length;
  var levels = [
    {w:'25%', c:'#ef4444', t:'😟 Zaif'},
    {w:'50%', c:'#f59e0b', t:'😐 O\'rta'},
    {w:'75%', c:'#3b82f6', t:'😊 Yaxshi'},
    {w:'100%',c:'#22c55e', t:'💪 Kuchli'},
  ];
  var l = levels[Math.max(0, score-1)];
  fill.style.width = l.w; fill.style.background = l.c;
  label.textContent = l.t; label.style.color = l.c;
}

function showErr(msg) {
  var b = document.getElementById('errBox');
  b.textContent = '❌ ' + msg; b.style.display = 'block';
  setTimeout(function(){b.style.display='none';}, 5000);
}

async function handleRegister(e) {
  e.preventDefault();
  var first = document.getElementById('firstName').value.trim();
  var last  = document.getElementById('lastName').value.trim();
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  var pass2 = document.getElementById('password2').value;
  var role  = document.getElementById('selectedRole').value;
  var name  = first + ' ' + last;

  if (pass !== pass2) { showErr('Parollar mos kelmaydi!'); return; }

  var btn = document.getElementById('regBtn');
  btn.textContent = '⏳ Yuklanmoqda...'; btn.disabled = true;

  if (firebaseOk) {
    var res = await registerUser(email, pass, name, role);
    if (res.success) {
      showToast('🎉 Muvaffaqiyatli ro\'yxatdan o\'tdingiz!');
      setTimeout(function(){
        window.location.href = role === 'seller' ? 'sell.html' : '../index.html';
      }, 900);
    } else {
      showErr(res.error);
      btn.textContent = 'Ro\'yxatdan o\'tish →'; btn.disabled = false;
    }
  } else {
    // Demo rejim
    var u = { uid:'demo-'+Date.now(), name, email, role };
    saveUserLocal(u);
    showToast('🎉 Demo rejimda ro\'yxatdan o\'tdingiz!');
    setTimeout(function(){
      window.location.href = role === 'seller' ? 'sell.html' : '../index.html';
    }, 900);
  }
}

// URL dan rol olish
var roleParam = new URLSearchParams(window.location.search).get('role');
if (roleParam === 'seller') {
  document.querySelectorAll('.role-tab')[1].click();
}
</script>
</body>
</html>
