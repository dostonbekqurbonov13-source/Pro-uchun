<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account sotish — InstaMarket.uz</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    .sell-page{padding-top:64px;min-height:100vh;background:var(--bg);}
    .sell-hero{background:var(--dark);padding:48px 32px;text-align:center;}
    .sell-hero h1{font-size:34px;font-weight:900;color:white;margin-bottom:10px;}
    .sell-hero p{color:rgba(255,255,255,0.5);font-size:15px;}
    .sell-wrap{max-width:760px;margin:0 auto;padding:32px 24px;}
    .steps-bar{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:32px;flex-wrap:wrap;}
    .sbar-item{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;color:var(--text-muted);background:white;border:1.5px solid var(--border);}
    .sbar-item.active{background:var(--gradient);color:white;border-color:transparent;}
    .sbar-item.done{background:var(--green-light);color:var(--green-dark);border-color:transparent;}
    .sbar-arrow{color:var(--text-muted);margin:0 5px;}
    .sell-card{background:white;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);margin-bottom:18px;}
    .sell-card h3{font-size:16px;font-weight:700;margin-bottom:4px;}
    .sell-card .sdesc{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
    .form-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .price-calc{background:var(--bg);border-radius:10px;padding:14px;border:1.5px solid var(--border);margin-top:14px;}
    .pcalc-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border-light);}
    .pcalc-row:last-child{border:none;font-weight:700;font-size:14px;}
    .rule-item{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--text-light);padding:6px 0;}
    .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:26px;text-align:center;cursor:pointer;transition:all 0.2s;}
    .upload-zone:hover{border-color:var(--primary);background:rgba(193,53,132,0.02);}
    .checker-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border-light);}
    .checker-row:last-child{border:none;}
    .cv-ok{color:var(--green-dark);font-weight:700;}
    .cv-fail{color:#dc2626;font-weight:700;}
    select.form-input{background:white;cursor:pointer;}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="navbar-brand">
    <img src="../images/logo.svg" width="32" height="32" style="border-radius:8px;" alt="logo"/>
    <span>InstaMarket</span>
  </a>
  <div class="nav-links">
    <a href="../index.html">Bosh sahifa</a>
    <a href="marketplace.html">Bozor</a>
    <a href="sell.html" style="color:var(--primary);font-weight:700;">💰 Sotish</a>
    <a href="login.html" class="btn-nav-login">Kirish</a>
    <a href="register.html" class="btn-nav-register">Ro'yxatdan o'tish</a>
  </div>
  <button class="nav-mobile-btn" onclick="toggleMenu()">☰</button>
</nav>

<div class="sell-page">
  <div class="sell-hero">
    <h1>💰 Account sotish</h1>
    <p>Bepul e'lon, 10% komissiya, xavfsiz to'lov</p>
  </div>
  <div class="sell-wrap" id="sellWrap">
    <!-- Auth tekshiruvi va kontent JS orqali to'ldiriladi -->
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:40px;margin-bottom:12px;">⏳</div>
      <p style="color:var(--text-muted);">Yuklanmoqda...</p>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
var firebaseOk = initFirebase();
var currentStep = 1;
var formData = {};

function renderSteps(){
  return '<div class="steps-bar">' +
    '<div class="sbar-item '+(currentStep>1?'done':currentStep===1?'active':'')+'" id="s1">① Ma\'lumot</div>' +
    '<div class="sbar-arrow">›</div>' +
    '<div class="sbar-item '+(currentStep>2?'done':currentStep===2?'active':'')+'" id="s2">② Tekshiruv</div>' +
    '<div class="sbar-arrow">›</div>' +
    '<div class="sbar-item '+(currentStep===3?'active':'')+'" id="s3">③ Nashr</div>' +
  '</div>';
}

function renderStep1(){
  return renderSteps() +
  '<div class="sell-card">' +
    '<h3>📋 Qoidalar</h3><p class="sdesc">Qabul qilinadigan accountlar</p>' +
    ['✅ Minimal 1,000 haqiqiy follower','✅ Engagement rate kamida 3%','✅ Account yoshi kamida 3 oy','✅ Kamida 20 ta post','❌ Nakrutka (sotib olingan) followers qabul qilinmaydi','ℹ️ Har savdodan 10% komissiya olinadi'].map(function(r){
      return '<div class="rule-item"><span>'+r.slice(0,2)+'</span><span>'+r.slice(2)+'</span></div>';
    }).join('') +
  '</div>' +
  '<div class="sell-card">' +
    '<h3>📱 Account ma\'lumotlari</h3><p class="sdesc">Instagram account haqida to\'liq kiriting</p>' +
    '<div class="form-group"><label>Instagram username *</label>' +
    '<div style="position:relative;"><span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-weight:600;">@</span>' +
    '<input type="text" class="form-input" id="f_username" placeholder="username" style="padding-left:30px;" required/></div></div>' +
    '<div class="form-row2">' +
      '<div class="form-group" style="margin:0;"><label>Followers soni *</label><input type="number" class="form-input" id="f_followers" placeholder="masalan: 1500" min="1000" oninput="calcPrice()" required/></div>' +
      '<div class="form-group" style="margin:0;"><label>Post soni *</label><input type="number" class="form-input" id="f_posts" placeholder="masalan: 45" min="20" required/></div>' +
    '</div>' +
    '<div class="form-row2" style="margin-top:14px;">' +
      '<div class="form-group" style="margin:0;"><label>Engagement Rate % *</label><input type="number" class="form-input" id="f_er" placeholder="masalan: 5.2" min="1" max="100" step="0.1" oninput="calcPrice()" required/></div>' +
      '<div class="form-group" style="margin:0;"><label>Account yoshi *</label><select class="form-input" id="f_age" required><option value="">Tanlang...</option><option>3-6 oy</option><option>6-12 oy</option><option>1-2 yil</option><option>2+ yil</option></select></div>' +
    '</div>' +
    '<div class="form-row2" style="margin-top:14px;">' +
      '<div class="form-group" style="margin:0;"><label>Kategoriya *</label><select class="form-input" id="f_category" required><option value="">Tanlang...</option><option value="food">🍔 Ovqat</option><option value="travel">✈️ Sayohat</option><option value="fitness">💪 Fitness</option><option value="beauty">💄 Go\'zallik</option><option value="business">💼 Biznes</option><option value="tech">📱 Tech</option><option value="art">🎨 San\'at</option><option value="home">🏠 Uy</option><option value="other">📌 Boshqa</option></select></div>' +
      '<div class="form-group" style="margin:0;"><label>Auditoriya</label><select class="form-input" id="f_audience"><option>🇺🇿 O\'zbekiston 80%+</option><option>🇺🇿 O\'zbekiston 50-80%</option><option>🌍 Aralash</option></select></div>' +
    '</div>' +
    '<div class="form-group" style="margin-top:14px;"><label>Tavsif * (kamida 30 belgi)</label>' +
    '<textarea class="form-input" id="f_desc" rows="4" placeholder="Account qanday kontentlar haqida? Auditoriya kim? Nima uchun qimmatli?..." style="resize:vertical;" oninput="document.getElementById(\'descLen\').textContent=this.value.length+\'/300\'" required></textarea>' +
    '<div style="font-size:12px;color:var(--text-muted);margin-top:4px;" id="descLen">0/300</div></div>' +
    '<div class="form-group"><label>Narx (so\'mda) *</label><input type="number" class="form-input" id="f_price" placeholder="masalan: 500000" min="50000" step="10000" oninput="calcPrice()" required/>' +
    '<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Minimal: 50,000 so\'m · Komissiya 10% hisoblanadi</div>' +
    '<div class="price-calc" id="priceCalc" style="display:none;">' +
      '<div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">💰 NARX HISOBI</div>' +
      '<div class="pcalc-row"><span>Siz so\'raydigan narx</span><span id="pc1">—</span></div>' +
      '<div class="pcalc-row"><span>Komissiya 10%</span><span id="pc2" style="color:#dc2626;">—</span></div>' +
      '<div class="pcalc-row"><span>✅ Sizga tushadigan summa</span><span id="pc3" style="color:var(--green-dark);">—</span></div>' +
    '</div></div>' +
  '</div>' +
  '<div class="sell-card">' +
    '<h3>📸 Screenshot (ixtiyoriy)</h3><p class="sdesc">Instagram Insights statistikasi — tasdiqlashni tezlashtiradi</p>' +
    '<div class="upload-zone" onclick="document.getElementById(\'fileInp\').click()"><div style="font-size:36px;margin-bottom:8px;">📊</div><p style="font-size:14px;color:var(--text-muted);"><strong style="color:var(--primary);">Rasm yuklash</strong> yoki bu yerga tashlang</p><p style="font-size:12px;color:var(--text-muted);margin-top:5px;">PNG, JPG — max 5MB</p></div>' +
    '<input type="file" id="fileInp" accept="image/*" multiple style="display:none;" onchange="showFiles(this.files)"/>' +
    '<div id="fileList" style="display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;"></div>' +
  '</div>' +
  '<div style="display:flex;justify-content:flex-end;">' +
    '<button class="btn btn-primary btn-lg" onclick="goStep2()">Keyingisi →</button>' +
  '</div>';
}

function renderStep2(){
  var f = formData;
  var checks = [
    {label:'Followers soni',ok:f.followers>=1000,val:f.followers+' ta'},
    {label:'Engagement Rate',ok:f.er>=3,val:f.er+'%'},
    {label:'Post soni',ok:f.posts>=20,val:f.posts+' ta'},
    {label:'Username format',ok:/^[a-zA-Z0-9._]+$/.test(f.username),val:'@'+f.username},
    {label:'Narx diapazon',ok:f.price>=10&&f.price<=2000,val:'$'+f.price},
    {label:'Tavsif uzunligi',ok:f.desc.length>=30,val:f.desc.length+' belgi'},
  ];
  var allOk = checks.every(function(c){return c.ok;});
  return renderSteps() +
  '<div class="sell-card">' +
    '<h3>🤖 Avtomatik tekshiruv natijasi</h3><p class="sdesc">Tizim ma\'lumotlaringizni tahlil qildi</p>' +
    '<div style="border:1.5px solid var(--border);border-radius:10px;overflow:hidden;">' +
      checks.map(function(c){
        return '<div class="checker-row" style="padding:10px 14px;"><span>'+c.label+'</span>' +
          '<span class="'+(c.ok?'cv-ok':'cv-fail')+'">'+(c.ok?'✅ ':'❌ ')+c.val+'</span></div>';
      }).join('') +
      '<div class="checker-row" style="padding:10px 14px;background:'+(allOk?'var(--green-light)':'#fee2e2')+';"><span style="font-weight:700;">Umumiy natija</span>' +
      '<span class="'+(allOk?'cv-ok':'cv-fail')+'" style="font-size:14px;">'+(allOk?'✅ Qabul qilindi':'❌ Talablar bajarilmadi')+'</span></div>' +
    '</div>' +
  '</div>' +
  '<div class="sell-card">' +
    '<h3>📄 Shartlarga rozilik</h3><p class="sdesc">E\'lon berish uchun tasdiqlang</p>' +
    ['Men account egasiman va sotish huquqiga egaman','Ko\'rsatilgan ma\'lumotlar to\'liq va haqiqiy','InstaMarket foydalanish shartlari va komissiya siyosatiga roziman'].map(function(t,i){
      return '<label style="display:flex;align-items:flex-start;gap:9px;font-size:13px;cursor:pointer;color:var(--text-light);padding:8px 0;border-bottom:1px solid var(--border-light);">' +
        '<input type="checkbox" id="agree'+i+'" style="margin-top:2px;accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;"/>'+t+'</label>';
    }).join('') +
  '</div>' +
  '<div style="display:flex;justify-content:space-between;gap:12px;">' +
    '<button class="btn btn-ghost btn-lg" onclick="currentStep=1;render()">← Orqaga</button>' +
    '<button class="btn btn-primary btn-lg" id="submitBtn" onclick="submitListing()">🚀 E\'lonni yuborish</button>' +
  '</div>';
}

function renderStep3(){
  return renderSteps() +
  '<div class="sell-card" style="text-align:center;padding:48px 28px;">' +
    '<div style="font-size:64px;margin-bottom:16px;">🎉</div>' +
    '<h2 style="font-size:26px;font-weight:900;margin-bottom:10px;">E\'lon yuborildi!</h2>' +
    '<p style="color:var(--text-light);font-size:15px;margin-bottom:28px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.7;">' +
    'Moderator <strong>24 soat</strong> ichida e\'loningizni tekshiradi va tasdiqlaydi. Natija haqida xabar olasiz.</p>' +
    '<div style="background:var(--bg);border-radius:12px;padding:18px;margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto;border:1.5px solid var(--border);text-align:left;">' +
      '<div style="font-size:12px;color:var(--text-muted);font-weight:700;margin-bottom:10px;text-transform:uppercase;">KEYINGI QADAMLAR</div>' +
      ['Moderator tekshiradi (24 soat)','E\'lon saytda chiqadi','Xaridor topilsa xabar keladi','To\'lov escrow ga tushadi','72 soat tekshiruvdan so\'ng pul sizga'].map(function(s,i){
        return '<div style="font-size:13px;color:var(--text-light);padding:5px 0;">'+( i+1)+'. '+s+'</div>';
      }).join('') +
    '</div>' +
    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
      '<a href="marketplace.html" class="btn btn-primary">Bozorni ko\'rish</a>' +
      '<a href="sell.html" class="btn btn-ghost">Yana e\'lon berish</a>' +
    '</div>' +
  '</div>';
}

function render(){
  var wrap = document.getElementById('sellWrap');
  if(!wrap) return;
  if(currentStep===1) wrap.innerHTML = renderStep1();
  else if(currentStep===2) wrap.innerHTML = renderStep2();
  else wrap.innerHTML = renderStep3();
}

function calcPrice(){
  var price = parseInt(document.getElementById('f_price')&&document.getElementById('f_price').value||0);
  var pc = document.getElementById('priceCalc');
  if(!pc) return;
  if(!price || price < 50000){ pc.style.display='none'; return; }
  pc.style.display='block';
  var comm = Math.round(price * 0.10);
  var net  = price - comm;
  document.getElementById('pc1').textContent = formatUZS(price);
  document.getElementById('pc2').textContent = '-' + formatUZS(comm);
  document.getElementById('pc3').textContent = formatUZS(net);
}

function showFiles(files){
  var list=document.getElementById('fileList');
  if(!list)return;
  Array.from(files).forEach(function(f){
    var d=document.createElement('div');
    d.style.cssText='background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:7px 11px;font-size:12px;';
    d.textContent='📎 '+f.name;
    list.appendChild(d);
  });
}

function goStep2(){
  var u=document.getElementById('f_username')&&document.getElementById('f_username').value.trim();
  var fl=parseInt(document.getElementById('f_followers')&&document.getElementById('f_followers').value||0);
  var er=parseFloat(document.getElementById('f_er')&&document.getElementById('f_er').value||0);
  var p=parseInt(document.getElementById('f_posts')&&document.getElementById('f_posts').value||0);
  var cat=document.getElementById('f_category')&&document.getElementById('f_category').value;
  var price=parseFloat(document.getElementById('f_price')&&document.getElementById('f_price').value||0);
  var desc=document.getElementById('f_desc')&&document.getElementById('f_desc').value.trim();
  var age=document.getElementById('f_age')&&document.getElementById('f_age').value;

  if(!u){showToast('Username kiriting!','error');return;}
  if(fl<1000){showToast('Minimum 1,000 followers bo\'lishi kerak!','error');return;}
  if(er<1){showToast('Engagement rate kiriting (min 1%)!','error');return;}
  if(p<20){showToast('Minimum 20 ta post!','error');return;}
  if(!cat){showToast('Kategoriya tanlang!','error');return;}
  if(price<50000){showToast('Minimal narx 50,000 so\'m!','error');return;}
  if(!desc||desc.length<30){showToast('Tavsif kamida 30 ta belgi bo\'lsin!','error');return;}
  if(!age){showToast('Account yoshini tanlang!','error');return;}

  formData={username:u,followers:fl,er:er,posts:p,category:cat,price:price,desc:desc,age:age,
    audience:document.getElementById('f_audience').value};
  currentStep=2;render();window.scrollTo({top:0,behavior:'smooth'});
}

async function submitListing(){
  if(![0,1,2].every(function(i){return document.getElementById('agree'+i)&&document.getElementById('agree'+i).checked;})){
    showToast('Barcha shartlarga rozi bo\'ling!','error');return;
  }
  var btn=document.getElementById('submitBtn');
  btn.textContent='⏳ Yuklanmoqda...';btn.disabled=true;

  var user=loadUser();
  if(firebaseOk&&user&&user.uid&&!user.uid.startsWith('demo')){
    var res=await addListing({
      username:formData.username,followers:formData.followers,er:formData.er,posts:formData.posts,
      category:formData.category,price:formData.price,description:formData.desc,age:formData.age,
      audience:formData.audience,emoji:getCatEmoji(formData.category),niche:getCatName(formData.category),
      badge:'pending',score:0,realFollowers:0,
    });
    if(!res.success){showToast(res.error||'Xato!','error');btn.textContent='🚀 E\'lonni yuborish';btn.disabled=false;return;}
  }
  setTimeout(function(){currentStep=3;render();window.scrollTo({top:0,behavior:'smooth'});},1000);
}

function getCatEmoji(c){return{food:'🍔',travel:'✈️',fitness:'💪',beauty:'💄',business:'💼',tech:'📱',art:'🎨',home:'🏠',other:'📌'}[c]||'📌';}
function getCatName(c){return{food:'Ovqat & Restoran',travel:'Sayohat',fitness:'Fitness & Sport',beauty:"Go'zallik",business:'Biznes',tech:'Texnologiya',art:"San'at",home:'Uy & Interyer',other:'Boshqa'}[c]||c;}

document.addEventListener('DOMContentLoaded',function(){
  var user=loadUser();
  if(!user){
    document.getElementById('sellWrap').innerHTML=
      '<div style="text-align:center;padding:60px 20px;background:white;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1.5px solid var(--border);">' +
      '<div style="font-size:52px;margin-bottom:14px;">🔐</div>' +
      '<h2 style="font-size:22px;font-weight:800;margin-bottom:8px;">Kirish talab qilinadi</h2>' +
      '<p style="color:var(--text-muted);margin-bottom:22px;">Account sotish uchun tizimga kiring</p>' +
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
      '<a href="login.html" class="btn btn-primary">Kirish</a>' +
      '<a href="register.html?role=seller" class="btn btn-ghost">Sotuvchi bo\'lib ro\'yxatdan o\'tish</a>' +
      '</div></div>';
    return;
  }
  if(user.role==='buyer'){
    document.getElementById('sellWrap').innerHTML=
      '<div style="text-align:center;padding:60px 20px;background:white;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1.5px solid var(--border);">' +
      '<div style="font-size:52px;margin-bottom:14px;">💡</div>' +
      '<h2 style="font-size:22px;font-weight:800;margin-bottom:8px;">Sotuvchi hisob kerak</h2>' +
      '<p style="color:var(--text-muted);margin-bottom:22px;">Siz xaridor sifatida kirgansiz. Sotish uchun yangi sotuvchi hisob oching.</p>' +
      '<a href="register.html?role=seller" class="btn btn-primary">Sotuvchi bo\'lib ro\'yxatdan o\'tish</a></div>';
    return;
  }
  render();
});
</script>
</body>
</html>
